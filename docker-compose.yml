version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://infinity_user:infinity_pass@postgres:5432/infinity_matrix
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on:
      - postgres
      - redis
      - mongodb
    volumes:
      - ./infinity_matrix:/app/infinity_matrix
    command: python -m infinity_matrix.api.server

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://infinity_user:infinity_pass@postgres:5432/infinity_matrix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - ./infinity_matrix:/app/infinity_matrix
    command: celery -A infinity_matrix.workers.celery_app worker --loglevel=info

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=infinity_user
      - POSTGRES_PASSWORD=infinity_pass
      - POSTGRES_DB=infinity_matrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  prometheus_data:
