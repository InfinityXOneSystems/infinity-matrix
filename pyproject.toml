[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "infinity-matrix"
version = "1.0.0"
description = "Enterprise intelligence platform with AI-powered analytics and autonomous lead generation"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "InfinityXOneSystems", email = "contact@infinityxonesystems.com"}
]
keywords = [
    "ai", "ml", "intelligence", "analytics", "crawler", "scraper",
    "lead-generation", "real-estate", "finance", "prediction"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    # Core
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "python-dotenv>=1.0.0",
    
    # Web Framework & API
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "httpx>=0.26.0",
    "aiohttp>=3.9.0",
    
    # Database
    "sqlalchemy>=2.0.25",
    "alembic>=1.13.0",
    "psycopg2-binary>=2.9.9",
    "asyncpg>=0.29.0",
    "redis>=5.0.1",
    "motor>=3.3.2",  # MongoDB async driver
    
    # Crawling & Scraping
    "playwright>=1.41.0",
    "selenium>=4.17.0",
    "beautifulsoup4>=4.12.3",
    "lxml>=5.1.0",
    "scrapy>=2.11.0",
    "pyppeteer>=2.0.0",
    
    # AI & ML
    "openai>=1.10.0",
    "anthropic>=0.18.0",
    "google-cloud-aiplatform>=1.42.0",
    "google-cloud-vision>=3.6.0",
    "langchain>=0.1.4",
    "langchain-openai>=0.0.5",
    "langchain-google-vertexai>=0.1.0",
    "transformers>=4.37.0",
    "torch>=2.2.0",
    "scikit-learn>=1.4.0",
    "pandas>=2.2.0",
    "numpy>=1.26.3",
    
    # NLP & Sentiment
    "nltk>=3.8.1",
    "spacy>=3.7.2",
    "textblob>=0.18.0",
    "vaderSentiment>=3.3.2",
    
    # Data Processing
    "polars>=0.20.5",
    "pyarrow>=15.0.0",
    "openpyxl>=3.1.2",
    "xlrd>=2.0.1",
    
    # Communication
    "twilio>=8.13.0",
    "sendgrid>=6.11.0",
    "jinja2>=3.1.3",
    
    # Task Queue & Workers
    "celery>=5.3.6",
    "dramatiq>=1.15.0",
    "arq>=0.25.0",
    
    # Crypto & Blockchain
    "web3>=6.15.0",
    "ccxt>=4.2.0",
    
    # Financial Data
    "yfinance>=0.2.35",
    "alpha-vantage>=2.3.1",
    "fredapi>=0.5.1",
    
    # Monitoring & Logging
    "structlog>=24.1.0",
    "sentry-sdk>=1.40.0",
    "prometheus-client>=0.19.0",
    
    # Utilities
    "tenacity>=8.2.3",
    "ratelimit>=2.2.1",
    "pyyaml>=6.0.1",
    "click>=8.1.7",
    "rich>=13.7.0",
    "tqdm>=4.66.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.4",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "black>=24.1.1",
    "ruff>=0.2.0",
    "mypy>=1.8.0",
    "pre-commit>=3.6.0",
]

docs = [
    "mkdocs>=1.5.3",
    "mkdocs-material>=9.5.6",
    "mkdocstrings[python]>=0.24.0",
]

all = ["infinity-matrix[dev,docs]"]

[project.urls]
Homepage = "https://github.com/InfinityXOneSystems/infinity-matrix"
Documentation = "https://docs.infinityxonesystems.com"
Repository = "https://github.com/InfinityXOneSystems/infinity-matrix"
Issues = "https://github.com/InfinityXOneSystems/infinity-matrix/issues"

[project.scripts]
infinity-matrix = "infinity_matrix.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["infinity_matrix*"]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]

[tool.coverage.run]
source = ["infinity_matrix"]
omit = ["*/tests/*", "*/test_*.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
