  deploy-monitoring-agent:
    name: Deploy Monitoring Agent
    runs-on: ubuntu-latest
    needs: validate-agents
    if: contains(needs.validate-agents.outputs.agents, 'monitoring')
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Monitoring Agent
        run: |
          echo "🚀 Deploying Monitoring Agent to ${{ inputs.environment }}"
