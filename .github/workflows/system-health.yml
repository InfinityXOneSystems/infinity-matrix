name: System Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check GitHub API
        run: |
          echo "Checking GitHub API..."
          if curl -s -o /dev/null -w "%{http_code}" https://api.github.com | grep -q "200"; then
            echo "✓ GitHub API is accessible"
          else
            echo "❌ GitHub API is not accessible"
            exit 1
          fi
      
      - name: Check Supabase Connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Checking Supabase connection..."
          if [ -z "$SUPABASE_URL" ]; then
            echo "⚠ Warning: SUPABASE_URL not configured"
          else
            if curl -s -o /dev/null -w "%{http_code}" "$SUPABASE_URL/rest/v1/" \
                 -H "apikey: $SUPABASE_KEY" | grep -q "200"; then
              echo "✓ Supabase is accessible"
            else
              echo "❌ Supabase is not accessible"
            fi
          fi
      
      - name: Check Website
        run: |
          echo "Checking infinityxai.com..."
          if curl -s -o /dev/null -w "%{http_code}" https://infinityxai.com | grep -q "200\|301\|302"; then
            echo "✓ Website is accessible"
          else
            echo "⚠ Warning: Website returned unexpected status"
          fi
      
      - name: Check Repository Health
        run: |
          echo "Checking repository health..."
          
          # Check for required files
          FILES=(
            "README.md"
            "docs/blueprint.md"
            "docs/roadmap.md"
            "docs/prompt_suite.md"
            "docs/system_manifest.md"
            "COLLABORATION.md"
            "setup_instructions.md"
          )
          
          missing=0
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "❌ $file is missing"
              missing=$((missing + 1))
            fi
          done
          
          if [ $missing -gt 0 ]; then
            echo "❌ $missing required files are missing"
            exit 1
          else
            echo "✓ All required files present"
          fi
      
      - name: Generate Health Report
        if: always()
        run: |
          echo "# System Health Report" > health_report.md
          echo "" >> health_report.md
          echo "**Generated**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> health_report.md
          echo "**Job Status**: ${{ job.status }}" >> health_report.md
          echo "" >> health_report.md
          echo "## Services" >> health_report.md
          echo "" >> health_report.md
          echo "- GitHub API: ✓ Accessible" >> health_report.md
          echo "- Supabase: Check logs for status" >> health_report.md
          echo "- Website: Check logs for status" >> health_report.md
          echo "- Repository: Check logs for status" >> health_report.md
          
          cat health_report.md
      
      - name: Upload Health Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: health_report.md
          retention-days: 30
      
      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 System Health Check Failed',
              body: `The system health check has detected issues.
              
              **Workflow Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              
              **Timestamp**: ${new Date().toISOString()}
              
              Please investigate immediately.`,
              labels: ['alert', 'health-check', 'priority-high']
            })
