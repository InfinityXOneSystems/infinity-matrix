      - name: Create Milestone
        id: create_milestone
        uses: actions/github-script@v7
        with:
          script: |
            try {
              // Check if milestone already exists
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              let milestone = milestones.data.find(m => m.title === 'Enterprise System Initialization');
              
              if (!milestone) {
                // Create milestone
                const milestoneResponse = await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Enterprise System Initialization',
                  description: 'Complete bootstrap and initialization of the Infinity Matrix enterprise system. This milestone tracks the setup of automation, documentation, SOPs, and foundational infrastructure.',
                  due_on: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString() // 30 days from now
                });
                milestone = milestoneResponse.data;
                console.log('✅ Milestone created:', milestone.number);
              } else {
                console.log('ℹ️ Milestone already exists:', milestone.number);
              }
              
              return milestone.number;
            } catch (error) {
              console.error('❌ Error creating milestone:', error.message);
              return null;
            }
      
      - name: Create Milestone Issue
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const milestoneNumber = ${{ steps.create_milestone.outputs.result }};
              
              // Check if issue already exists
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'bootstrap,infrastructure'
              });
              
              const existingIssue = issues.data.find(i => i.title === 'Enterprise System Initialization - Bootstrap Complete');
              
              if (existingIssue) {
                console.log('ℹ️ Milestone issue already exists:', existingIssue.number);
                return;
              }
              
              const issueBody = `# 🚀 Enterprise System Bootstrap Complete
              
              The Infinity Matrix enterprise system has been successfully bootstrapped!
              
              ## ✅ Completed
              
              - [x] Folder structure created
                - \`docs/sops/\` - Standard Operating Procedures
                - \`docs/tracking/\` - Progress tracking
                - \`docs/architecture/\` - Architecture documentation
              - [x] Standard Operating Procedures generated
                - \`CODE_REVIEW_SOP.md\` - Code review process
                - \`DEPLOYMENT_SOP.md\` - Deployment procedures
                - \`INCIDENT_RESPONSE_SOP.md\` - Incident handling
                - \`SECURITY_SOP.md\` - Security protocols
              - [x] Bootstrap tracking document created
              - [x] All files committed and pushed to repository
              - [x] Milestone created
              - [x] This issue created
              
              ## 📋 Next Steps
              
              - [ ] Review and customize generated SOPs for your organization
              - [ ] Set up CI/CD workflows for your technology stack
              - [ ] Enable GitHub security features (Dependabot, code scanning, secret scanning)
              - [ ] Configure branch protection rules
              - [ ] Set up project board (optional)
              - [ ] Onboard team members and assign roles
              - [ ] Create initial architecture documentation
              - [ ] Set up monitoring and alerting
              - [ ] Configure deployment environments
              - [ ] Schedule team training on SOPs
              
              ## 📚 Documentation
              
              - [Bootstrap Documentation](../blob/main/docs/INFINITY_MATRIX_ENTERPRISE_BOOTSTRAP.md)
              - [Bootstrap Status](../blob/main/docs/tracking/BOOTSTRAP_STATUS.md)
              - [Code Review SOP](../blob/main/docs/sops/CODE_REVIEW_SOP.md)
              - [Deployment SOP](../blob/main/docs/sops/DEPLOYMENT_SOP.md)
              - [Incident Response SOP](../blob/main/docs/sops/INCIDENT_RESPONSE_SOP.md)
              - [Security SOP](../blob/main/docs/sops/SECURITY_SOP.md)
              
              ## 🔗 Workflow Details
              
              - **Workflow Run**: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              - **Triggered By**: ${context.actor}
              - **Execution Date**: ${new Date().toISOString().split('T')[0]}
              
              ## 🎯 Success Metrics
              
              This bootstrap has established:
              - ✅ Complete folder structure for enterprise operations
              - ✅ 4 comprehensive SOPs covering critical processes
              - ✅ Tracking infrastructure for progress monitoring
              - ✅ Foundation for continuous automation
              - ✅ Audit trail with complete git history
              
              ## 💡 Tips
              
              1. **Review SOPs**: Take time to read through each SOP and understand the processes
              2. **Customize**: Adapt SOPs to your organization's specific needs
              3. **Communicate**: Share documentation with your team
              4. **Iterate**: Continuously improve processes based on feedback
              5. **Automate**: Build on this foundation with additional automation
              
              ## ❓ Support
              
              If you encounter any issues or have questions:
              1. Review the [Bootstrap Documentation](../blob/main/docs/INFINITY_MATRIX_ENTERPRISE_BOOTSTRAP.md)
              2. Check the workflow logs above
              3. Create a new issue with details
              
              ---
              
              **This issue tracks the Enterprise System Initialization milestone. Close this issue once all next steps are completed and the system is fully operational.**`;
              
              const labels = ['enhancement', 'documentation', 'infrastructure', 'bootstrap'];
              
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Enterprise System Initialization - Bootstrap Complete',
                body: issueBody,
                labels: labels,
                milestone: milestoneNumber || undefined
              });
              
              console.log('✅ Milestone issue created:', issue.data.number);
              console.log('🔗 Issue URL:', issue.data.html_url);
            } catch (error) {
              console.error('❌ Error creating issue:', error.message);
              // Don't fail the workflow if issue creation fails
            }
      
