name: Documentation Build and Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'src/**/*.py'
      - 'frontend/**/*.ts'
      - 'frontend/**/*.tsx'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'src/**/*.py'
      - 'frontend/**/*.ts'
      - 'frontend/**/*.tsx'

jobs:
  build-python-docs:
    name: Build Python API Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
          # Install project dependencies if requirements.txt exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Sphinx documentation
        run: |
          # Create docs directory structure if not exists
          mkdir -p docs/api/python
          
          # Initialize Sphinx if not already done
          if [ ! -f docs/api/python/conf.py ]; then
            sphinx-quickstart -q -p "Infinity Matrix" -a "Infinity X One Systems" \
              -v "1.0.0" --ext-autodoc --ext-viewcode --ext-intersphinx \
              --makefile --no-batchfile docs/api/python
          fi
          
          # Build HTML documentation
          cd docs/api/python
          make html || echo "No Python source to document yet"

      - name: Upload Python docs artifact
        uses: actions/upload-artifact@v3
        with:
          name: python-docs
          path: docs/api/python/_build/html/
          retention-days: 30

  build-typescript-docs:
    name: Build TypeScript API Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install TypeDoc
        run: npm install -g typedoc

      - name: Build TypeDoc documentation
        run: |
          # Create docs directory structure
          mkdir -p docs/api/typescript
          
          # Create typedoc.json if not exists
          if [ ! -f typedoc.json ]; then
            cat > typedoc.json << 'EOF'
{
  "entryPoints": ["./frontend/src"],
  "out": "docs/api/typescript",
  "name": "Infinity Matrix TypeScript API",
  "exclude": ["**/*.test.ts", "**/*.spec.ts", "**/node_modules/**"],
  "excludePrivate": true,
  "excludeProtected": false,
  "includeVersion": true,
  "readme": "none"
}
EOF
          fi
          
          # Build TypeScript documentation if frontend exists
          if [ -d frontend/src ]; then
            typedoc || echo "No TypeScript source to document yet"
          fi

      - name: Upload TypeScript docs artifact
        uses: actions/upload-artifact@v3
        with:
          name: typescript-docs
          path: docs/api/typescript/
          retention-days: 30

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
          folder-path: 'docs/'

      - name: Lint markdown
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: docs/**/*.md
          config_file: .markdownlint.json
          ignore_files: docs/api/

  build-pdf-docs:
    name: Build PDF Documentation
    runs-on: ubuntu-latest
    needs: [build-python-docs, build-typescript-docs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra

      - name: Build PDF from Markdown
        run: |
          mkdir -p docs/_exports
          
          # Combine key documentation into PDF
          pandoc README.md \
            docs/architecture/README.md \
            docs/guides/QUICK_START.md \
            docs/agents/REGISTRY.md \
            -o docs/_exports/infinity-matrix-documentation.pdf \
            --toc --toc-depth=3 \
            --metadata title="Infinity Matrix Documentation" \
            --metadata author="Infinity X One Systems" \
            --metadata date="$(date +%Y-%m-%d)" \
            || echo "PDF generation skipped - content may not be ready"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v3
        with:
          name: pdf-docs
          path: docs/_exports/
          retention-days: 90

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [build-python-docs, build-typescript-docs, validate-docs]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Python docs
        uses: actions/download-artifact@v3
        with:
          name: python-docs
          path: docs/api/python/_build/html/

      - name: Download TypeScript docs
        uses: actions/download-artifact@v3
        with:
          name: typescript-docs
          path: docs/api/typescript/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: docs/reports/CHANGELOG.md

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: update changelog [skip ci]'
          file_pattern: docs/reports/CHANGELOG.md

  doc-coverage-report:
    name: Documentation Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install interrogate
        run: pip install interrogate

      - name: Check Python docstring coverage
        run: |
          mkdir -p docs/reports
          interrogate -v --fail-under=0 --generate-badge docs/reports/ src/ || true
          interrogate -v src/ > docs/reports/docstring-coverage.txt || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: doc-coverage
          path: docs/reports/
          retention-days: 30

  update-doc-index:
    name: Update Documentation Index
    runs-on: ubuntu-latest
    needs: [build-python-docs, build-typescript-docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update documentation timestamp
        run: |
          # Update README with last updated timestamp
          sed -i "s/\*\*Last Updated\*\*:.*/\*\*Last Updated\*\*: $(date +%Y-%m-%d)/" README.md

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: update documentation timestamp [skip ci]'
          file_pattern: README.md

  notify:
    name: Notify Documentation Update
    runs-on: ubuntu-latest
    needs: [deploy-docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Send notification
        run: |
          echo "Documentation has been updated and deployed"
          # Add Slack/Discord/Email notification here if needed
