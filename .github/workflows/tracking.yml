name: Automated Tracking System

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  track-changes:
    runs-on: ubuntu-latest
    name: Track Repository Changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up tracking environment
        run: |
          mkdir -p docs/tracking/commit
          mkdir -p docs/tracking/workflow
          mkdir -p docs/tracking/pr
          DATE=$(date +%Y-%m-%d)
          echo "TRACKING_DATE=$DATE" >> $GITHUB_ENV
          echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
      
      - name: Track commit changes
        if: github.event_name == 'push'
        run: |
          cat > docs/tracking/commit/commit-${GITHUB_SHA:0:7}-${{ env.TIMESTAMP }}.json << 'EOF'
          {
            "timestamp": "${{ env.TIMESTAMP }}",
            "event_type": "commit",
            "event_id": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "action": "push",
            "details": {
              "ref": "${{ github.ref }}",
              "repository": "${{ github.repository }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "modified_files_count": "${{ github.event.head_commit.modified.length }}",
              "added_files_count": "${{ github.event.head_commit.added.length }}",
              "removed_files_count": "${{ github.event.head_commit.removed.length }}"
            },
            "status": "success",
            "metadata": {
              "commit_sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "workflow_run_id": "${{ github.run_id }}"
            }
          }
          EOF
          
          echo "✅ Tracked commit: ${{ github.sha }}"
      
      - name: Track PR changes
        if: github.event_name == 'pull_request'
        run: |
          cat > docs/tracking/pr/pr-${{ github.event.pull_request.number }}-${{ env.TIMESTAMP }}.json << 'EOF'
          {
            "timestamp": "${{ env.TIMESTAMP }}",
            "event_type": "pull_request",
            "event_id": "pr-${{ github.event.pull_request.number }}",
            "actor": "${{ github.actor }}",
            "action": "${{ github.event.action }}",
            "details": {
              "pr_number": ${{ github.event.pull_request.number }},
              "title": "${{ github.event.pull_request.title }}",
              "state": "${{ github.event.pull_request.state }}",
              "draft": ${{ github.event.pull_request.draft }},
              "base_ref": "${{ github.event.pull_request.base.ref }}",
              "head_ref": "${{ github.event.pull_request.head.ref }}",
              "mergeable": "${{ github.event.pull_request.mergeable }}"
            },
            "status": "tracked",
            "metadata": {
              "pr_number": ${{ github.event.pull_request.number }},
              "workflow_run_id": "${{ github.run_id }}"
            }
          }
          EOF
          
          echo "✅ Tracked PR: #${{ github.event.pull_request.number }}"
      
      - name: Track workflow execution
        run: |
          cat > docs/tracking/workflow/workflow-${{ github.run_id }}-${{ env.TIMESTAMP }}.json << 'EOF'
          {
            "timestamp": "${{ env.TIMESTAMP }}",
            "event_type": "workflow",
            "event_id": "run-${{ github.run_id }}",
            "actor": "${{ github.actor }}",
            "action": "workflow_run",
            "details": {
              "workflow_name": "${{ github.workflow }}",
              "workflow_run_id": "${{ github.run_id }}",
              "workflow_run_number": "${{ github.run_number }}",
              "event_name": "${{ github.event_name }}",
              "repository": "${{ github.repository }}"
            },
            "status": "running",
            "metadata": {
              "workflow_run_id": "${{ github.run_id }}",
              "run_attempt": "${{ github.run_attempt }}"
            }
          }
          EOF
          
          echo "✅ Tracked workflow run: ${{ github.run_id }}"
      
      - name: Update tracking index
        run: |
          # Create or update tracking index
          if [ ! -f docs/tracking/index.md ]; then
            cat > docs/tracking/index.md << 'EOF'
          # Tracking Index
          
          ## Recent Activity
          
          EOF
          fi
          
          # Add entry to index
          echo "- [${{ env.TIMESTAMP }}] ${{ github.event_name }} by ${{ github.actor }} - Run #${{ github.run_id }}" >> docs/tracking/index.md
          
          echo "✅ Updated tracking index"
      
      - name: Commit tracking logs
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          git config user.name "Infinity Matrix Bot"
          git config user.email "bot@infinity-matrix.system"
          
          git add docs/tracking/
          
          if git diff --staged --quiet; then
            echo "No tracking changes to commit"
          else
            git commit -m "🤖 Auto-track: ${{ github.event_name }} by ${{ github.actor }} at ${{ env.TIMESTAMP }}"
            
            # Try to push, but don't fail if it doesn't work (e.g., on PR from fork)
            git push || echo "⚠️  Could not push tracking logs (expected on PR from fork)"
          fi
      
      - name: Generate summary
        run: |
          echo "## 📊 Tracking Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${{ env.TIMESTAMP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run**: #${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All tracking logs generated successfully" >> $GITHUB_STEP_SUMMARY
