name: Code Synchronization

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-dependencies:
    name: Sync Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for dependency updates
        id: check-deps
        run: |
          pip install pip-check-updates
          pip-check-updates -u || true
          if git diff --quiet requirements.txt; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR for dependency updates
        if: steps.check-deps.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Python dependencies'
          title: 'chore: automated dependency updates'
          body: |
            ## Automated Dependency Updates
            
            This PR updates Python dependencies to their latest compatible versions.
            
            Please review the changes and run tests before merging.
          branch: automated/dependency-updates
          delete-branch: true
          labels: dependencies,automated

