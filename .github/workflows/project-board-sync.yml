name: Project Board Sync

on:
  issues:
    types: [opened, reopened, closed, assigned, labeled]
  pull_request:
    types: [opened, reopened, closed, ready_for_review, converted_to_draft, review_requested]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-project-board:
    runs-on: ubuntu-latest
    name: Sync with GitHub Project Board
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Add to Project Board
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/orgs/InfinityXOneSystems/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Log project board sync
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          mkdir -p docs/tracking/project-board
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          if [ "${{ github.event_name }}" = "issues" ]; then
            ITEM_TYPE="issue"
            ITEM_NUMBER="${{ github.event.issue.number }}"
            ITEM_STATE="${{ github.event.issue.state }}"
            # Escape title for JSON
            ESCAPED_TITLE=$(echo "$ISSUE_TITLE" | jq -Rs .)
          else
            ITEM_TYPE="pull_request"
            ITEM_NUMBER="${{ github.event.pull_request.number }}"
            ITEM_STATE="${{ github.event.pull_request.state }}"
            # Escape title for JSON
            ESCAPED_TITLE=$(echo "$PR_TITLE" | jq -Rs .)
          fi
          
          cat > docs/tracking/project-board/sync-${ITEM_TYPE}-${ITEM_NUMBER}-${TIMESTAMP}.json << EOF
          {
            "timestamp": "${TIMESTAMP}",
            "event_type": "project_board_sync",
            "event_id": "${ITEM_TYPE}-${ITEM_NUMBER}",
            "actor": "${{ github.actor }}",
            "action": "${{ github.event.action }}",
            "details": {
              "item_type": "${ITEM_TYPE}",
              "item_number": ${ITEM_NUMBER},
              "item_title": ${ESCAPED_TITLE},
              "item_state": "${ITEM_STATE}",
              "event_action": "${{ github.event.action }}"
            },
            "status": "synced",
            "metadata": {
              "project_url": "https://github.com/orgs/InfinityXOneSystems/projects/1",
              "workflow_run_id": "${{ github.run_id }}"
            }
          }
          EOF
          
          echo "✅ Synced ${ITEM_TYPE} #${ITEM_NUMBER} to Project Board"
      
      - name: Generate sync summary
        run: |
          echo "## 📋 Project Board Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Action**: ${{ github.event.action }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Item successfully added/updated on Project Board" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Project Board](https://github.com/orgs/InfinityXOneSystems/projects/1)" >> $GITHUB_STEP_SUMMARY

  update-project-status:
    runs-on: ubuntu-latest
    name: Update Project Item Status
    needs: sync-project-board
    
    steps:
      - name: Determine target column
        id: column
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            case "${{ github.event.action }}" in
              opened|reopened)
                echo "status=To Do" >> $GITHUB_OUTPUT
                ;;
              assigned)
                echo "status=In Progress" >> $GITHUB_OUTPUT
                ;;
              closed)
                echo "status=Done" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "status=To Do" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            case "${{ github.event.action }}" in
              opened|reopened)
                if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
                  echo "status=In Progress" >> $GITHUB_OUTPUT
                else
                  echo "status=Review" >> $GITHUB_OUTPUT
                fi
                ;;
              ready_for_review|review_requested)
                echo "status=Review" >> $GITHUB_OUTPUT
                ;;
              converted_to_draft)
                echo "status=In Progress" >> $GITHUB_OUTPUT
                ;;
              closed)
                if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                  echo "status=Done" >> $GITHUB_OUTPUT
                else
                  echo "status=To Do" >> $GITHUB_OUTPUT
                fi
                ;;
              *)
                echo "status=To Do" >> $GITHUB_OUTPUT
                ;;
            esac
          fi
      
      - name: Log status update
        run: |
          echo "📍 Determined target status: ${{ steps.column.outputs.status }}"
          echo "Note: Automatic column movement requires GraphQL API access with project permissions"
          echo "Manual status updates can be done via the Project Board UI"
