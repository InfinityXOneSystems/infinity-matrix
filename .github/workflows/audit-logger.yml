name: Audit Logger

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, closed, merged]
  workflow_run:
    workflows: ["*"]
    types: [completed]
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  generate-audit-log:
    runs-on: ubuntu-latest
    name: Generate Audit Trail
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up audit environment
        run: |
          mkdir -p docs/tracking/audit
          DATE=$(date +%Y-%m-%d)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "AUDIT_DATE=$DATE" >> $GITHUB_ENV
          echo "AUDIT_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "AUDIT_ID=$(uuidgen || echo $RANDOM-$RANDOM-$RANDOM)" >> $GITHUB_ENV
      
      - name: Collect system state
        run: |
          echo "Collecting system state for audit..."
          
          # Count files by type
          WORKFLOW_COUNT=$(find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | wc -l)
          AGENT_COUNT=$(find agents cortex index_system -type f -name "*.py" -o -name "*.js" 2>/dev/null | wc -l || echo 0)
          SOP_COUNT=$(find docs/sops -name "*.md" 2>/dev/null | wc -l)
          TRACKING_COUNT=$(find docs/tracking -name "*.json" 2>/dev/null | wc -l)
          
          echo "WORKFLOW_COUNT=$WORKFLOW_COUNT" >> $GITHUB_ENV
          echo "AGENT_COUNT=$AGENT_COUNT" >> $GITHUB_ENV
          echo "SOP_COUNT=$SOP_COUNT" >> $GITHUB_ENV
          echo "TRACKING_COUNT=$TRACKING_COUNT" >> $GITHUB_ENV
      
      - name: Generate comprehensive audit log
        run: |
          cat > docs/tracking/audit/audit-${{ env.AUDIT_ID }}-${{ env.AUDIT_TIMESTAMP }}.json << 'EOF'
          {
            "audit_id": "${{ env.AUDIT_ID }}",
            "timestamp": "${{ env.AUDIT_TIMESTAMP }}",
            "event_type": "system_audit",
            "actor": "${{ github.actor }}",
            "trigger_event": "${{ github.event_name }}",
            "repository": {
              "name": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "workflow_run_id": "${{ github.run_id }}"
            },
            "system_state": {
              "workflow_files": ${{ env.WORKFLOW_COUNT }},
              "agent_modules": ${{ env.AGENT_COUNT }},
              "sop_documents": ${{ env.SOP_COUNT }},
              "tracking_logs": ${{ env.TRACKING_COUNT }}
            },
            "event_details": {
              "event_name": "${{ github.event_name }}",
              "action": "${{ github.event.action }}",
              "ref_name": "${{ github.ref_name }}",
              "ref_type": "${{ github.ref_type }}"
            },
            "metadata": {
              "workflow": "${{ github.workflow }}",
              "run_number": ${{ github.run_number }},
              "run_attempt": ${{ github.run_attempt }},
              "server_url": "${{ github.server_url }}",
              "api_url": "${{ github.api_url }}"
            },
            "status": "completed",
            "audit_level": "info"
          }
          EOF
          
          echo "✅ Generated audit log: ${{ env.AUDIT_ID }}"
      
      - name: Detect significant changes
        id: changes
        run: |
          SIGNIFICANT=false
          
          # Check for workflow changes
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -q ".github/workflows/"; then
            echo "🔍 Workflow changes detected"
            SIGNIFICANT=true
          fi
          
          # Check for agent/module changes
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -E "(agents|cortex|index_system)/"; then
            echo "🔍 Agent/module changes detected"
            SIGNIFICANT=true
          fi
          
          # Check for SOP changes
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep "docs/sops/"; then
            echo "🔍 SOP changes detected"
            SIGNIFICANT=true
          fi
          
          echo "significant=$SIGNIFICANT" >> $GITHUB_OUTPUT
      
      - name: Create audit summary
        run: |
          cat > docs/tracking/audit/summary-${{ env.AUDIT_DATE }}.md << EOF
          # Audit Summary - ${{ env.AUDIT_DATE }}
          
          **Generated**: ${{ env.AUDIT_TIMESTAMP }}  
          **Audit ID**: ${{ env.AUDIT_ID }}  
          **Trigger**: ${{ github.event_name }} by ${{ github.actor }}
          
          ## System Snapshot
          
          - **Workflow Files**: ${{ env.WORKFLOW_COUNT }}
          - **Agent Modules**: ${{ env.AGENT_COUNT }}
          - **SOP Documents**: ${{ env.SOP_COUNT }}
          - **Tracking Logs**: ${{ env.TRACKING_COUNT }}
          
          ## Activity
          
          - **Repository**: ${{ github.repository }}
          - **Branch**: ${{ github.ref_name }}
          - **Commit**: ${{ github.sha }}
          - **Workflow Run**: #${{ github.run_id }}
          
          ## Status
          
          ✅ Audit completed successfully
          
          ---
          *Auto-generated by Infinity Matrix Audit System*
          EOF
          
          echo "✅ Created audit summary"
      
      - name: Update audit index
        run: |
          if [ ! -f docs/tracking/audit/index.md ]; then
            cat > docs/tracking/audit/index.md << 'EOF'
          # Audit Log Index
          
          This index tracks all audit log entries generated by the system.
          
          ## Recent Audits
          
          EOF
          fi
          
          # Add entry to index
          echo "- [${{ env.AUDIT_TIMESTAMP }}] Audit ID: ${{ env.AUDIT_ID }} - Triggered by ${{ github.event_name }}" >> docs/tracking/audit/index.md
          
          echo "✅ Updated audit index"
      
      - name: Commit audit logs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "Infinity Matrix Audit Bot"
          git config user.email "audit@infinity-matrix.system"
          
          git add docs/tracking/audit/
          
          if git diff --staged --quiet; then
            echo "No audit changes to commit"
          else
            git commit -m "📋 Audit log: ${{ env.AUDIT_ID }} at ${{ env.AUDIT_TIMESTAMP }}"
            git push || echo "⚠️  Could not push audit logs"
          fi
      
      - name: Generate audit summary report
        run: |
          echo "## 📋 Audit Log Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Audit ID**: ${{ env.AUDIT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${{ env.AUDIT_TIMESTAMP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### System State" >> $GITHUB_STEP_SUMMARY
          echo "- Workflows: ${{ env.WORKFLOW_COUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "- Agents: ${{ env.AGENT_COUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "- SOPs: ${{ env.SOP_COUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tracking Logs: ${{ env.TRACKING_COUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Audit trail generated and logged" >> $GITHUB_STEP_SUMMARY
