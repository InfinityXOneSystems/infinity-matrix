name: SOP Generator

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'agents/**'
      - 'cortex/**'
      - 'index_system/**'
      - 'docs/sops/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sops:
    runs-on: ubuntu-latest
    name: Update Standard Operating Procedures
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up SOP environment
        run: |
          mkdir -p docs/sops
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          VERSION=$(date +%Y%m%d%H%M%S)
          echo "SOP_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "SOP_VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Analyze workflow changes
        id: workflows
        run: |
          echo "Analyzing workflow files..."
          
          WORKFLOW_LIST=""
          for workflow in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [ -f "$workflow" ]; then
              WORKFLOW_NAME=$(basename "$workflow")
              WORKFLOW_LIST="${WORKFLOW_LIST}- ${WORKFLOW_NAME}\n"
            fi
          done
          
          echo "workflows<<EOF" >> $GITHUB_OUTPUT
          echo -e "$WORKFLOW_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Generate Workflow Operations SOP
        run: |
          cat > docs/sops/workflow-operations.md << 'EOF'
          # Workflow Operations SOP
          
          **SOP ID**: SOP-002  
          **Version**: ${{ env.SOP_VERSION }}  
          **Last Updated**: ${{ env.SOP_TIMESTAMP }}  
          **Status**: Active
          
          ## Purpose
          
          This SOP documents the automated workflows that maintain the Infinity Matrix system, their triggers, and operational procedures.
          
          ## Scope
          
          This document covers all GitHub Actions workflows in `.github/workflows/` and their operational characteristics.
          
          ## Active Workflows
          
          ${{ steps.workflows.outputs.workflows }}
          
          ### Tracking Workflow
          **File**: `tracking.yml`  
          **Purpose**: Automatically track all repository changes  
          **Triggers**:
          - Push events to any branch
          - Pull request events (open, sync, reopen, close)
          - Manual workflow dispatch
          
          **Operations**:
          1. Creates tracking logs for commits in `docs/tracking/commit/`
          2. Creates tracking logs for PRs in `docs/tracking/pr/`
          3. Records workflow executions in `docs/tracking/workflow/`
          4. Updates tracking index with latest activity
          5. Auto-commits tracking logs to repository
          
          **Outputs**: JSON log files with timestamped activity records
          
          ### Project Board Sync Workflow
          **File**: `project-board-sync.yml`  
          **Purpose**: Synchronize Issues and PRs with GitHub Project Board  
          **Triggers**:
          - Issue events (open, reopen, close, assign, label)
          - Pull request events (open, reopen, close, ready_for_review, draft, review_requested)
          
          **Operations**:
          1. Adds new Issues/PRs to Project Board
          2. Determines appropriate column based on state
          3. Logs synchronization activity
          4. Updates project board status
          
          **Column Mapping**:
          - **To Do**: New items, reopened items
          - **In Progress**: Assigned issues, draft PRs
          - **Review**: PRs ready for review
          - **Done**: Closed/merged items
          
          ### Audit Logger Workflow
          **File**: `audit-logger.yml`  
          **Purpose**: Generate comprehensive audit trails  
          **Triggers**:
          - Push events
          - Pull request events
          - Workflow completion events
          - Release events
          
          **Operations**:
          1. Collects system state snapshot
          2. Generates comprehensive audit log with unique ID
          3. Detects significant changes (workflows, agents, SOPs)
          4. Creates daily audit summaries
          5. Maintains audit index
          
          **Outputs**: Timestamped audit logs in `docs/tracking/audit/`
          
          ### SOP Generator Workflow
          **File**: `sop-generator.yml`  
          **Purpose**: Maintain up-to-date documentation  
          **Triggers**:
          - Changes to workflow files
          - Changes to agent/module files
          - Changes to SOP files
          - Manual dispatch
          
          **Operations**:
          1. Analyzes structural changes
          2. Updates relevant SOPs
          3. Regenerates SOP index
          4. Updates knowledge base references
          
          ### Dashboard Updater Workflow
          **File**: `dashboard-updater.yml`  
          **Purpose**: Refresh admin dashboard with latest status  
          **Triggers**:
          - Scheduled (hourly)
          - Significant system changes
          - Manual dispatch
          
          **Operations**:
          1. Collects system metrics
          2. Generates status summaries
          3. Updates dashboard HTML
          4. Publishes to GitHub Pages
          
          ## Workflow Monitoring
          
          ### Success Criteria
          - All workflows complete without errors
          - Logs are generated and committed
          - No missed events or triggers
          
          ### Failure Handling
          - Workflows retry automatically on transient failures
          - Persistent failures generate alerts in workflow summary
          - Manual intervention required for configuration errors
          
          ### Performance Metrics
          - Average execution time: < 2 minutes
          - Success rate target: > 99%
          - Log generation completeness: 100%
          
          ## Maintenance
          
          ### Regular Tasks
          - Review workflow logs weekly
          - Validate audit log completeness
          - Check for failed workflow runs
          - Update SOP documentation as workflows evolve
          
          ### Troubleshooting
          
          **Issue**: Workflow fails to commit logs  
          **Solution**: Check branch protection rules and bot permissions
          
          **Issue**: Project board sync fails  
          **Solution**: Verify project board URL and access token
          
          **Issue**: Audit logs missing  
          **Solution**: Check workflow triggers and file permissions
          
          ## References
          
          - [System Overview SOP](system-overview.md)
          - [Audit Logging SOP](audit-logging.md)
          - [GitHub Actions Documentation](https://docs.github.com/actions)
          
          ## Revision History
          
          | Version | Date | Changes | Updated By |
          |---------|------|---------|------------|
          | ${{ env.SOP_VERSION }} | ${{ env.SOP_TIMESTAMP }} | Auto-generated update | SOP Generator |
          
          ---
          
          **Auto-generated by Infinity Matrix SOP System**
          EOF
          
          echo "✅ Generated Workflow Operations SOP"
      
      - name: Generate Agent Deployment SOP
        run: |
          cat > docs/sops/agent-deployment.md << 'EOF'
          # Agent Deployment SOP
          
          **SOP ID**: SOP-003  
          **Version**: ${{ env.SOP_VERSION }}  
          **Last Updated**: ${{ env.SOP_TIMESTAMP }}  
          **Status**: Active
          
          ## Purpose
          
          This SOP defines procedures for deploying and managing agent modules in the Infinity Matrix system.
          
          ## Scope
          
          Covers all agent modules in:
          - `/agents/` - Agent implementations
          - `/cortex/` - Core processing modules
          - `/index_system/` - Indexing and search modules
          
          ## Deployment Process
          
          ### Pre-Deployment
          1. Code review completed and approved
          2. All tests passing
          3. Documentation updated
          4. Security scan completed
          
          ### Deployment Steps
          1. Merge PR to main branch
          2. Automated tracking workflow triggers
          3. Audit log generated
          4. SOPs updated automatically
          5. Dashboard reflects new deployment
          
          ### Post-Deployment
          1. Monitor workflow execution
          2. Verify audit logs created
          3. Check dashboard status
          4. Validate agent functionality
          
          ## Agent Types
          
          ### Tracking Agents
          Monitor repository activity and generate logs
          
          ### Processing Agents
          Handle data processing and transformations
          
          ### Integration Agents
          Manage external system integrations
          
          ## Monitoring
          
          - Check workflow execution logs
          - Review agent-specific logs in `docs/tracking/agent/`
          - Monitor dashboard for agent status
          
          ## Rollback Procedures
          
          If agent deployment fails:
          1. Revert commit via git
          2. Review failure logs
          3. Fix issues
          4. Redeploy following standard process
          
          ## References
          
          - [System Overview SOP](system-overview.md)
          - [Workflow Operations SOP](workflow-operations.md)
          
          ## Revision History
          
          | Version | Date | Changes | Updated By |
          |---------|------|---------|------------|
          | ${{ env.SOP_VERSION }} | ${{ env.SOP_TIMESTAMP }} | Auto-generated update | SOP Generator |
          
          ---
          
          **Auto-generated by Infinity Matrix SOP System**
          EOF
          
          echo "✅ Generated Agent Deployment SOP"
      
      - name: Update SOP index
        run: |
          cat > docs/sops/index.md << 'EOF'
          # SOP Index
          
          **Last Updated**: ${{ env.SOP_TIMESTAMP }}
          
          ## Available SOPs
          
          1. [SOP-001: System Overview](system-overview.md)
          2. [SOP-002: Workflow Operations](workflow-operations.md)
          3. [SOP-003: Agent Deployment](agent-deployment.md)
          4. [SOP-004: Project Board Management](project-board-management.md)
          5. [SOP-005: Audit Logging](audit-logging.md)
          
          ## Quick Links
          
          - [Tracking System Documentation](../tracking/README.md)
          - [Knowledge Library](../../infinity_library/README.md)
          - [Main README](../../README.md)
          
          ---
          
          **Auto-maintained by SOP Generator Workflow**
          EOF
          
          echo "✅ Updated SOP index"
      
      - name: Commit SOP updates
        run: |
          git config user.name "Infinity Matrix SOP Bot"
          git config user.email "sop@infinity-matrix.system"
          
          git add docs/sops/
          
          if git diff --staged --quiet; then
            echo "No SOP changes to commit"
          else
            git commit -m "📚 Auto-update SOPs: v${{ env.SOP_VERSION }} at ${{ env.SOP_TIMESTAMP }}"
            git push || echo "⚠️  Could not push SOP updates"
          fi
      
      - name: Generate SOP summary
        run: |
          echo "## 📚 SOP Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ env.SOP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${{ env.SOP_TIMESTAMP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Updated SOPs" >> $GITHUB_STEP_SUMMARY
          echo "- System Overview" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow Operations" >> $GITHUB_STEP_SUMMARY
          echo "- Agent Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All SOPs updated successfully" >> $GITHUB_STEP_SUMMARY
