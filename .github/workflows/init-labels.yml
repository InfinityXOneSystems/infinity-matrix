name: Initialize Repository Labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create automation labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              {
                name: 'ready-to-merge',
                color: '0e8a16',
                description: 'PR is ready to be merged automatically'
              },
              {
                name: 'do-not-merge',
                color: 'd93f0b',
                description: 'Prevents automatic merging of this PR'
              },
              {
                name: 'wip',
                color: 'fbca04',
                description: 'Work in progress - do not merge'
              },
              {
                name: 'work-in-progress',
                color: 'fbca04',
                description: 'Work in progress - do not merge'
              },
              {
                name: 'needs-review',
                color: '0052cc',
                description: 'Requires review before merging'
              },
              {
                name: 'auto-fixed',
                color: '1d76db',
                description: 'Automatically fixed by auto-fix workflow'
              },
              {
                name: 'auto-resolved',
                color: '5319e7',
                description: 'Conflicts automatically resolved'
              },
              {
                name: 'auto-merged',
                color: '0e8a16',
                description: 'Automatically merged by workflow'
              }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`✓ Created label: ${label.name}`);
              } catch (error) {
                if (error.status === 422) {
                  console.log(`→ Label already exists: ${label.name}`);
                  // Update existing label
                  try {
                    await github.rest.issues.updateLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                    console.log(`✓ Updated label: ${label.name}`);
                  } catch (updateError) {
                    console.log(`✗ Failed to update label: ${label.name}`);
                  }
                } else {
                  console.log(`✗ Error creating label ${label.name}:`, error.message);
                }
              }
            }

            console.log('\n✅ Label initialization complete!');
