name: Autonomous CD Pipeline

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  run-autonomous-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run autonomous CD pipeline
        run: |
          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/src"
          python -m agents.orchestrator
      
      - name: Generate reports
        run: |
          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/src"
          python -c "from exporters.artifact_exporter import ArtifactExporter; ArtifactExporter().export_all()"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-artifacts-${{ github.run_number }}
          path: .prooftest/
          retention-days: 90
      
      - name: Commit and push changes
        run: |
          git config --local user.email "automation@infinity-matrix.ai"
          git config --local user.name "Infinity Matrix Bot"
          git add .prooftest/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update audit artifacts [skip ci]" && git push)
        continue-on-error: true
