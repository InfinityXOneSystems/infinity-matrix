name: Dashboard Updater

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'docs/**'
      - 'agents/**'
      - 'cortex/**'
      - 'index_system/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    name: Update Admin Dashboard
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Collect system metrics
        id: metrics
        run: |
          echo "Collecting system metrics..."
          
          # Count workflows
          WORKFLOW_COUNT=$(find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | wc -l)
          echo "workflows=$WORKFLOW_COUNT" >> $GITHUB_OUTPUT
          
          # Count SOPs
          SOP_COUNT=$(find docs/sops -name "*.md" 2>/dev/null | wc -l)
          echo "sops=$SOP_COUNT" >> $GITHUB_OUTPUT
          
          # Count tracking logs
          TRACKING_COUNT=$(find docs/tracking -name "*.json" 2>/dev/null | wc -l)
          echo "tracking=$TRACKING_COUNT" >> $GITHUB_OUTPUT
          
          # Count agent modules
          AGENT_COUNT=$(find agents cortex index_system -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" \) 2>/dev/null | wc -l || echo 0)
          echo "agents=$AGENT_COUNT" >> $GITHUB_OUTPUT
          
          # Get timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
          echo "✅ Metrics collected"
      
      - name: Update dashboard metrics
        run: |
          # Update the dashboard with current metrics
          sed -i 's/id="workflowCount">[0-9]*/id="workflowCount">${{ steps.metrics.outputs.workflows }}/' dashboard/index.html
          sed -i 's/id="sopCount">[0-9]*/id="sopCount">${{ steps.metrics.outputs.sops }}/' dashboard/index.html
          sed -i 's/id="trackingCount">[0-9]*/id="trackingCount">${{ steps.metrics.outputs.tracking }}/' dashboard/index.html
          sed -i 's/id="agentCount">[0-9]*/id="agentCount">${{ steps.metrics.outputs.agents }}/' dashboard/index.html
          
          echo "✅ Dashboard metrics updated"
      
      - name: Generate status summary
        run: |
          mkdir -p dashboard
          
          cat > dashboard/status.json << EOF
          {
            "timestamp": "${{ steps.metrics.outputs.timestamp }}",
            "system_status": "operational",
            "metrics": {
              "workflows": ${{ steps.metrics.outputs.workflows }},
              "sops": ${{ steps.metrics.outputs.sops }},
              "tracking_logs": ${{ steps.metrics.outputs.tracking }},
              "agent_modules": ${{ steps.metrics.outputs.agents }}
            },
            "components": {
              "tracking_system": "operational",
              "project_board_sync": "operational",
              "audit_logger": "operational",
              "sop_generator": "operational",
              "dashboard": "operational"
            }
          }
          EOF
          
          echo "✅ Status summary generated"
      
      - name: Commit dashboard updates
        run: |
          git config user.name "Infinity Matrix Dashboard Bot"
          git config user.email "dashboard@infinity-matrix.system"
          
          git add dashboard/
          
          if git diff --staged --quiet; then
            echo "No dashboard changes to commit"
          else
            git commit -m "📊 Auto-update dashboard: ${{ steps.metrics.outputs.timestamp }}"
            git push || echo "⚠️  Could not push dashboard updates"
          fi
      
      - name: Generate dashboard summary
        run: |
          echo "## 📊 Dashboard Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${{ steps.metrics.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "- **System Status**: Operational" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Current Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- Workflows: ${{ steps.metrics.outputs.workflows }}" >> $GITHUB_STEP_SUMMARY
          echo "- SOPs: ${{ steps.metrics.outputs.sops }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tracking Logs: ${{ steps.metrics.outputs.tracking }}" >> $GITHUB_STEP_SUMMARY
          echo "- Agent Modules: ${{ steps.metrics.outputs.agents }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dashboard updated successfully" >> $GITHUB_STEP_SUMMARY

  deploy-pages:
    runs-on: ubuntu-latest
    needs: update-dashboard
    name: Deploy to GitHub Pages
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Generate deployment summary
        run: |
          echo "## 🚀 GitHub Pages Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard deployed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Dashboard URL**: https://infinityxonesystems.github.io/infinity-matrix/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The dashboard will be available in a few minutes." >> $GITHUB_STEP_SUMMARY
