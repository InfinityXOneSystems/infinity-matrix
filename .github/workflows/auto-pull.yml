name: Auto PR Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  auto-pull:
    name: Auto Pull and Sync
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "Infinity Matrix Bot"
          git config user.email "bot@infinityxone.systems"
      
      - name: Fetch upstream changes
        run: |
          git fetch origin
          git pull origin main --rebase
      
      - name: Check for updates
        id: check_updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "updates=true" >> $GITHUB_OUTPUT
          else
            echo "updates=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.check_updates.outputs.updates == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Auto-sync: Update from upstream'
          title: 'Auto-sync: Update from upstream'
          body: |
            This PR was automatically created to sync with upstream changes.
            
            - Auto-generated by Infinity Matrix MCP
            - Changes have been automatically reviewed
          branch: auto-sync-${{ github.run_number }}
          labels: automated, sync
