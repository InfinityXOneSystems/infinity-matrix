apiVersion: infinity.systems/v1
kind: SystemManifest
metadata:
  name: infinity-matrix
  version: 1.0.0
  description: Universal Enterprise Operating System
  repository: https://github.com/InfinityXOneSystems/infinity-matrix
  
spec:
  core:
    name: Infinity Matrix Core
    components:
      - name: system-controller
        type: core
        path: src/core/controller.ts
        enabled: true
      - name: config-manager
        type: core
        path: src/core/config.ts
        enabled: true
      - name: lifecycle-manager
        type: core
        path: src/core/lifecycle.ts
        enabled: true
      - name: event-bus
        type: core
        path: src/core/events.ts
        enabled: true

  gateways:
    - name: api-gateway
      type: http
      port: 3000
      path: src/gateways/api-gateway.ts
      features:
        - rate-limiting
        - authentication
        - load-balancing
        - cors
      enabled: true
      
    - name: mcp-gateway
      type: mcp
      port: 3050
      path: src/gateways/mcp-gateway.ts
      protocol: MCP/1.0
      features:
        - agent-discovery
        - message-routing
        - protocol-translation
      enabled: true
      
    - name: websocket-gateway
      type: websocket
      port: 3100
      path: src/gateways/websocket-gateway.ts
      features:
        - realtime-updates
        - pub-sub
        - presence
      enabled: true

  agents:
    registry: manifests/agents/
    auto_discovery: true
    deployment_strategy: rolling
    health_check_interval: 30s
    
  orchestration:
    engine: src/orchestration/engine.ts
    workflow_path: manifests/workflows/
    max_parallel_executions: 10
    retry_policy:
      max_attempts: 3
      backoff: exponential
      initial_delay: 1s
      max_delay: 60s

  intelligence:
    services:
      - name: crawler
        path: src/intelligence/crawler.ts
        enabled: true
      - name: processor
        path: src/intelligence/processor.ts
        enabled: true
      - name: analyzer
        path: src/intelligence/analyzer.ts
        enabled: true
      - name: ml-pipeline
        path: src/intelligence/ml-pipeline.ts
        enabled: false

  monitoring:
    prometheus:
      enabled: true
      port: 9090
      scrape_interval: 15s
    logging:
      level: info
      path: ./logs
      retention_days: 30
    tracing:
      enabled: true
      jaeger_endpoint: http://localhost:14268/api/traces
    alerting:
      enabled: true
      rules_path: config/alerts.yml

  storage:
    primary:
      type: postgresql
      connection_string: ${DATABASE_URL}
      pool_size: 20
    cache:
      type: redis
      connection_string: ${REDIS_URL}
      ttl: 300
    search:
      type: elasticsearch
      connection_string: ${ELASTICSEARCH_URL}
      indices:
        - agents
        - workflows
        - intelligence
        - audit

  integrations:
    external:
      - name: openai
        enabled: true
        config_path: config/integrations/openai.yml
      - name: anthropic
        enabled: true
        config_path: config/integrations/anthropic.yml
      - name: aws
        enabled: false
        config_path: config/integrations/aws.yml
      - name: azure
        enabled: false
        config_path: config/integrations/azure.yml
      - name: gcp
        enabled: false
        config_path: config/integrations/gcp.yml

  security:
    authentication:
      type: jwt
      secret: ${JWT_SECRET}
      expiry: 24h
    authorization:
      enabled: true
      model: rbac
    encryption:
      at_rest: true
      in_transit: true
      algorithm: AES-256-GCM
    audit:
      enabled: true
      log_all_requests: true
      retention_days: 90

  compliance:
    frameworks:
      - gdpr
      - soc2
      - hipaa
    audit_schedule: "0 0 * * 0"  # Weekly
    reporting:
      enabled: true
      format: json
      path: ./reports/compliance

  industries:
    enabled:
      - real-estate
      - healthcare
      - finance
      - manufacturing
      - retail
    templates_path: templates/industries/
    custom_vertical_support: true

  deployment:
    strategy: rolling
    max_unavailable: 1
    health_check:
      enabled: true
      endpoint: /health
      interval: 30s
      timeout: 10s
    scaling:
      auto: true
      min_instances: 1
      max_instances: 10
      target_cpu: 70
      target_memory: 80

  backup:
    enabled: true
    schedule: "0 0 * * *"  # Daily
    retention_days: 30
    storage:
      type: local
      path: ./backups
    include:
      - database
      - config
      - manifests
      - logs

  features:
    circuit_breaker: true
    rate_limiting: true
    caching: true
    compression: true
    cors: true
    api_versioning: true
    webhook_support: true
    batch_processing: true
    streaming: true

maintenance:
  window:
    enabled: false
    schedule: "0 2 * * 0"  # Sunday 2 AM
    duration: 2h
  auto_updates:
    enabled: false
    channel: stable
  health_checks:
    startup:
      enabled: true
      initial_delay: 10s
      period: 5s
    liveness:
      enabled: true
      period: 30s
    readiness:
      enabled: true
      period: 10s
